<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumnos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="estilos.css">
</head>

<body style="background-color:#e9e9e9; font-family: Arial;">
    <nav>
        <a href="index.html" style="text-decoration: none;"><i class="bi bi-reply-fill"></i>Volver al Listado</a>
    </nav>
    <main>
        <h1><i class="bi bi-person-vcard"></i> Ficha de Matricula</h1>
        <p>Complete los datos del nuevo Estudiante.</p>
        <hr>
        <form action="index.html">
            <label><i class="bi bi-person"></i><b>Nombres Completos:</b></label><br>
            <input type="text" placeholder="Ej Ana Lucia" size="60" required><br>
            <label><i class="bi bi-person-fill"></i><b>Apellidos</b></label><br>
            <input type="text" placeholder="Ej Torres Vega" size="60" required><br>
            <label><b><i class="bi bi-envelope"></i>Correo Electrónico</b></label><br>
            <input type="text" placeholder="alumno@instituto.edu.pe" size="60" required><br>
            <label><b><i class="bi bi-house-door-fill"></i>Carrera</b></label><br>
            <select style="width: 457px;">
                <option value="">--Seleccionar--</option>
                <option value="Desarrollo de Software">Desarrollo de Software</option>
                <option value="Diseño Gráfico">Diseño Gráfico</option>
                <option value="Marketing">Marketing</option>
            </select>
            <br><br>
            <button type="submit" style="width:457px;background-color:black;color:white;padding:10px;border:none;font-weight:bold;"><i class="bi bi-box-arrow-in-down"></i>GUARDAR DATOS</button>
        </form>

    </main>
</body>

</html>
